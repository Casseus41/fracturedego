<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — fractureD Ego</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Nunito+Sans:wght@300;400;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../css/styles.css"/>
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; }
  </style>
</head>
<body>

  <nav class="topnav">
    <a href="../index.html" class="nav-wordmark">fracture<span>D</span> Ego</a>
    <div class="nav-right">
      <a href="../index.html" class="btn-ghost">← Back</a>
    </div>
  </nav>

  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-icon">👤</div>
      <div class="auth-tag">Members Only</div>
      <h2 class="auth-heading">Hello again. <em>Please sign in.</em></h2>
      <p class="auth-sub">We're here for you. Enter your credentials below to access your concierge dashboard.</p>

      <div id="error-banner" class="alert-banner hidden">
        Those credentials don't match our records. Please try again.
      </div>

      <div class="field">
        <div class="field-inner">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
        </div>
      </div>
      <div class="field">
        <div class="field-inner">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Your password" autocomplete="current-password"/>
        </div>
      </div>

      <button class="btn-primary" id="login-btn" onclick="handleLogin()">Sign In</button>

      <div class="auth-footer">
        <a href="forgot-password.html">Forgot your password?</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/supabase-config.js"></script>
  <script>
    // Redirect if already logged in
    (async () => {
      const user = await getCurrentUser();
      if (user) window.location.href = 'dashboard.html';
    })();

    async function handleLogin() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('login-btn');
      const errBanner = document.getElementById('error-banner');

      if (!email || !password) {
        errBanner.textContent = 'Please enter your email and password.';
        errBanner.classList.remove('hidden');
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="loader"></span>';
      errBanner.classList.add('hidden');

      try {
        await signIn(email, password);
        window.location.href = 'dashboard.html';
      } catch (err) {
        errBanner.textContent = 'Those credentials don\'t match our records. Please try again.';
        errBanner.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    }

    // Enter key support
    document.getElementById('password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
    document.getElementById('email').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleLogin();
    });
  </script>
</body>
</html>
