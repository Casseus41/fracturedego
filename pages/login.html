<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex, nofollow"/>
  <title>Sign In — fractureD Ego</title>
  <link rel="stylesheet" href="../css/styles.css"/>
  <style>body { display:flex; flex-direction:column; min-height:100vh; }</style>
</head>
<body>

  <nav class="topnav">
    <a href="../index.html" class="nav-brand">fracture<span class="accent">D</span> Ego</a>
    <div class="nav-right">
      <a href="../index.html" class="btn btn-ghost">← Back</a>
    </div>
  </nav>

  <div class="auth-page">

    <a href="../index.html" class="auth-logo">fracture<span>D</span> Ego</a>

    <div class="auth-card">
      <div class="auth-icon-wrap">👤</div>
      <div class="auth-eyebrow">Members Only</div>
      <h1 class="auth-title">Hello again. <em>Please sign in.</em></h1>
      <p class="auth-subtitle">We're here for you. Enter your credentials below to access your concierge dashboard.</p>

      <div id="alert" class="alert alert-error hidden"></div>

      <div class="field">
        <label class="field-label">Email Address</label>
        <div class="field-input">
          <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Password</label>
        <div class="field-input">
          <input type="password" id="password" placeholder="Your password" autocomplete="current-password"/>
        </div>
      </div>

      <button class="btn btn-primary btn-full btn-lg" id="login-btn" onclick="handleLogin()" style="margin-top:8px;">
        Sign In
      </button>

      <div class="auth-footer-link" style="margin-top:16px;">
        <a href="forgot-password.html">Forgot your password?</a>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../js/app.js"></script>
  <script>
    (async () => { await redirectIfAuthed(); })();

    async function handleLogin() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('alert', 'Please enter your email and password.'); return;
      }

      setLoading('login-btn', true);
      hideAlert('alert');

      try {
        await signIn(email, password);
        window.location.href = 'https://fracturedego.org/pages/dashboard.html';
      } catch(e) {
        showAlert('alert', 'Those credentials don\'t match our records. Please try again.');
        setLoading('login-btn', false, 'Sign In');
      }
    }

    ['email','password'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });
    });
  </script>
</body>
</html>
